name: Validar y Corregir Calidad
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar herramientas
        run: composer require --dev "squizlabs/php_codesniffer=*"

      - name: Auto-corrección (PHPCBF)
        run: |
          ./vendor/bin/phpcbf --standard=PSR12 local_seguridad/ local_aichat/ local_aipredict/ || true
          
      - name: Validación final (PHPCS)
        run: ./vendor/bin/phpcs --standard=PSR12 local_seguridad/ local_aichat/ local_aipredict/